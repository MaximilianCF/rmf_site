name: style

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  style:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libudev-dev libgtk-3-dev

    - name: rustfmt
      run: |
        rustup component add rustfmt clippy

    - name: style
      run: cargo fmt --check

    - name: clippy
      run: cargo clippy --workspace -- -W clippy::all

    - name: minimal feature build
      run: cd crates/rmf_site_format && cargo check --no-default-features
